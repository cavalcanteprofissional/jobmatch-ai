# Render Blueprint — JobMatch AI
# Deploy: https://render.com  (Free Tier)
# Nota: Frontend Static Site é criado manualmente via Dashboard
#       (Render Blueprint não suporta type: static)

services:
  # ── API FastAPI ──────────────────────────────────────────────
  - type: web
    name: jobmatch-api
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
    disk:
      name: jobmatch-data
      mountPath: /app/data
      sizeGB: 1
