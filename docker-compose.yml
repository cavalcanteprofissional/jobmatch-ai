version: "3.9"

services:
  api:
    build: .
    container_name: jobmatch-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env.local:/app/.env.local:ro
    environment:
      - STREAMLIT_USE_API=true
      - API_URL=http://api:8000
    env_file:
      - .env.local
    restart: unless-stopped
    networks:
      - jobmatch-net

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: jobmatch-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - jobmatch-net

networks:
  jobmatch-net:
    driver: bridge
